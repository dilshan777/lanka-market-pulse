name: Fetch Business News

on:
  schedule:
    - cron: '*/30 4-9 * * 1-5'  # Every 30 min during market hours
  workflow_dispatch:

jobs:
  fetch-business-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch business news
        run: node scripts/fetchBusinessNews.js
        env:
          NODE_ENV: production

      - name: Commit and push new articles
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git pull --rebase origin main
          git add content/articles/
          git diff --staged --quiet || git commit -m "auto: business news $(date +'%Y-%m-%d %H:%M')"
          git push