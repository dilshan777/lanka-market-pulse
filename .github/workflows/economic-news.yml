name: Fetch Economic News

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  fetch-economic-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch economic news
        run: node scripts/fetchEconomicNews.js
        env:
          NODE_ENV: production

      - name: Commit and push updates
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git pull --rebase origin main
          git add content/articles/ content/data/
          git diff --staged --quiet || git commit -m "auto: economic data $(date +'%Y-%m-%d %H:%M')"
          git push