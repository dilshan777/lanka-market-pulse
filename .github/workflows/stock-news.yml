name: Fetch Stock Market News

on:
  schedule:
    # Run every 15 minutes during market hours (9:30 AM - 2:30 PM SL time = 4:00 - 9:00 UTC)
    - cron: '*/15 4-9 * * 1-5'
  workflow_dispatch:
    inputs:
      manual_trigger:
        description: 'Manually trigger stock news fetch'
        required: false
        default: 'true'

jobs:
  fetch-stock-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch stock market news
        run: node scripts/fetchStockNews.js
        env:
          NODE_ENV: production

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet HEAD -- content/articles/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push new articles
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/articles/
          git commit -m "[AUTO] Stock market news update - $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Trigger deployment
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          curl -X POST             -H "Authorization: token ${{ secrets.DEPLOY_HOOK_TOKEN }}"             -H "Accept: application/vnd.github.v3+json"             https://api.github.com/repos/${{ github.repository }}/dispatches             -d '{"event_type": "deploy"}'
