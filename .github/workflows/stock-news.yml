name: Daily Market Report

on:
  schedule:
    - cron: '30 9 * * 1-5'  # 3:00 PM SL time (UTC 9:30)
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate daily report
        run: node scripts/generateDailyReport.js
        env:
          NODE_ENV: production

      - name: Commit and push report
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git pull --rebase origin main
          git add content/reports/ content/daily-briefing.json
          git diff --staged --quiet || git commit -m "auto: daily report $(date +'%Y-%m-%d')"
          git push