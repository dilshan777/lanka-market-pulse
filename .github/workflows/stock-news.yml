name: Fetch Stock Market News

on:
  schedule:
    - cron: '*/15 4-9 * * 1-5'  # Every 15 min, 9:30AM-2:30PM SL time
  workflow_dispatch:

jobs:
  fetch-stock-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch stock market news
        run: node scripts/fetchStockNews.js
        env:
          NODE_ENV: production

      - name: Commit and push new articles
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git pull --rebase origin main
          git add content/articles/ content/data/
          git diff --staged --quiet || git commit -m "auto: stock news $(date +'%Y-%m-%d %H:%M')"
          git push